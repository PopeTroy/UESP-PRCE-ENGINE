name: UESP-PRCE-CORE
on:
  workflow_dispatch:
    inputs:
      subject:
        description: 'Target Vector'
        required: true
        default: 'Global System'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Force Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Execute Universal Protocol Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IP_TOKEN: ${{ secrets.IP_TOKEN }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python main.py "${{ github.event.inputs.subject }}"

      - name: Commit and Push Results
        run: |
          git config --global user.name "UESP-Bot"
          git config --global user.email "bot@celsiustechmediagroup.co.za"
          git add result.json
          git commit -m "Protocol Overwrite: ${{ github.event.inputs.subject }}" || exit 0
          git push
