name: UESP-PRCE-CORE
on:
  workflow_dispatch:
    inputs:
      subject:
        description: 'Target Vector'
        required: true
        default: 'Global System'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Force-Update LPU Libraries
        # This ensures the 'Dispatch' never fails due to version mismatch
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests groq

      - name: Execute 33° Protocol Audit
        # The LPU Dispatch happens here; Secrets must be precisely mapped
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IP_TOKEN: ${{ secrets.IP_TOKEN }}
        run: python main.py "${{ github.event.inputs.subject }}"

      - name: Commit Resonance Data
        # Saves the LPU's internal database findings to result.json
        run: |
          git config --global user.name "UESP-Bot"
          git config --global user.email "bot@celsiustechmediagroup.co.za"
          git add result.json
          git commit -m "Audit Resonant: ${{ github.event.inputs.subject }}" || exit 0
          git push
