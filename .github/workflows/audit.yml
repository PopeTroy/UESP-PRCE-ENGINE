name: UESP-PRCE-CORE
on:
  workflow_dispatch:
    inputs:
      subject:
        description: 'Target Vector'
        required: true
        default: 'Global'

jobs:
  audit:
    runs-on: ubuntu-latest
    # ... rest of your code

      - name: Execute Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IP_TOKEN: ${{ secrets.IP_TOKEN }}
          DM_API_KEY: ${{ secrets.DM_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python main.py "${{ github.event.inputs.subject }}"
