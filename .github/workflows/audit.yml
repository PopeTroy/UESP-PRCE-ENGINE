name: UESP-PRCE-CORE
on:
  workflow_dispatch:
    inputs:
      subject:
        description: 'Target Vector (Industry/Region)'
        required: true
        default: 'Global System'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install requests groq

      - name: Execute Universal Protocol Audit
        env:
          # LINKING SECRETS FROM THE VAULT TO THE ENGINE
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DM_API_KEY: ${{ secrets.DM_API_KEY }}
          IP_TOKEN: ${{ secrets.IP_TOKEN }}
        run: python main.py "${{ github.event.inputs.subject }}"

      - name: Commit and Push Results
        run: |
          git config --global user.name "UESP-Bot"
          git config --global user.email "info@celsiustechmediagroup.co.za"
          git add result.json
          git commit -m "Protocol Overwrite: ${{ github.event.inputs.subject }}" || exit 0
          git push
