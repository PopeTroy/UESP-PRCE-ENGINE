name: UESP PRCE 33 DEGREE ENGINE

on:
  repository_dispatch:
    types: [execute_stab]

env:
  # Force Node.js 24 to resolve deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kinetic Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Execute Political Synthesis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        # Passing the subject from the website to the python script
        run: python main.py "${{ github.event.client_payload.subject }}"

      - name: Commit and Push Resonance
        run: |
          git config --global user.name "PopeTroy"
          git config --global user.email "info@celsiusmediagroup.co.za"
          git add result.json
          git commit -m "33rd Degree Political Summary: ${{ github.event.client_payload.subject }}" || exit 0
          git push
