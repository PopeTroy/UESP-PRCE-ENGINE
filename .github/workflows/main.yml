name: UESP PRCE 33 DEGREE ENGINE

on:
  repository_dispatch:
    types: [execute_stab]

# Opting into Node.js 24 environment immediately
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Already v4, compatible with Node 24

      - name: Setup Python 3.10
        uses: actions/setup-python@v5 # Updated to v5 for Node 24 support
        with:
          python-version: '3.10'

      - name: Install Kinetic Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Execute 33 Degree Synthesis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python main.py "${{ github.event.client_payload.subject }}"

      - name: Commit and Push Resonance
        run: |
          git config --global user.name "PopeTroy"
          git config --global user.email "info@celsiusmediagroup.co.za"
          git add result.json
          git commit -m "33rd Degree Resonance: ${{ github.event.client_payload.subject }}" || exit 0
          git push
